<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>ZELKOVAS STORE</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#C0141E;--navy2:#9E0F18;--gold:#ffffff;
  --bg:#F7F5F5;--card:#fff;--border:rgba(0,0,0,0.1);
  --text:#1A0A0A;--muted:#7A6060;
}
html,body{height:100%;font-family:'Helvetica Neue',Arial,'Hiragino Kaku Gothic ProN',sans-serif;background:var(--bg);color:var(--text);}
body{max-width:430px;margin:0 auto;}
.screen{display:none;flex-direction:column;min-height:100vh;}
.screen.active{display:flex;}
#s-access{background:var(--navy);}
.access-inner{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 28px;}
.team-badge{text-align:center;margin-bottom:44px;}
.tb-tag{font-size:11px;letter-spacing:0.35em;color:var(--gold);text-transform:uppercase;margin-bottom:10px;opacity:0.85;}
.tb-name{font-size:30px;font-weight:800;color:#fff;letter-spacing:-0.02em;}
.tb-sub{font-size:12px;color:rgba(255,255,255,0.3);margin-top:6px;letter-spacing:0.12em;}
.a-card{width:100%;background:rgba(255,255,255,0.06);border:0.5px solid rgba(255,255,255,0.14);border-radius:18px;padding:28px 24px;}
.a-label{font-size:11px;letter-spacing:0.15em;color:rgba(255,255,255,0.45);text-transform:uppercase;display:block;margin-bottom:12px;}
.a-input{width:100%;background:rgba(255,255,255,0.09);border:1px solid rgba(255,255,255,0.18);border-radius:10px;padding:16px;font-size:22px;letter-spacing:0.6em;color:#fff;text-align:center;text-transform:uppercase;outline:none;margin-bottom:6px;}
.a-input:focus{border-color:#fff;}
.a-err{font-size:12px;color:#EF9F9F;text-align:center;height:20px;line-height:20px;margin-bottom:6px;}
.btn-gold{width:100%;background:#fff;color:var(--navy);border:none;border-radius:10px;padding:16px;font-size:15px;font-weight:800;letter-spacing:0.05em;cursor:pointer;}
.demo-hint{margin-top:18px;font-size:11px;color:rgba(255,255,255,0.35);text-align:center;line-height:1.7;}
.top-bar{background:var(--navy);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:sticky;top:0;z-index:50;}
.bar-logo{font-size:15px;font-weight:800;color:#fff;}
.bar-cart{background:rgba(255,255,255,0.12);border:none;border-radius:8px;padding:7px 13px;color:#fff;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:6px;}
.badge{background:#fff;color:var(--navy);border-radius:50%;width:18px;height:18px;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.back-link{font-size:13px;font-weight:600;color:var(--gold);cursor:pointer;}
/* Profile */
#s-profile{background:var(--bg);}
.profile-bar{background:var(--navy2);padding:10px 18px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.who{font-size:12px;color:rgba(255,255,255,0.55);}
.who b{color:#fff;}
.edit-link{font-size:11px;color:var(--gold);cursor:pointer;background:none;border:none;padding:0;}
.form-body{flex:1;padding:22px 18px;overflow-y:auto;}
.f-intro{font-size:16px;font-weight:800;margin-bottom:4px;}
.f-sub{font-size:13px;color:var(--muted);margin-bottom:24px;line-height:1.6;}
.f-group{margin-bottom:20px;}
.f-label{font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:7px;}
.f-input{width:100%;border:1px solid var(--border);border-radius:10px;padding:13px;font-size:15px;background:#fff;color:var(--text);outline:none;-webkit-appearance:none;}
.f-input:focus{border-color:var(--navy);}
.f-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.f-hint{font-size:11px;color:var(--muted);margin-top:5px;line-height:1.6;}
.pay-opts{display:flex;gap:10px;margin-top:8px;}
.pay-opt{flex:1;border:1px solid var(--border);border-radius:12px;padding:14px 8px;text-align:center;cursor:pointer;background:#fff;transition:border-color 0.15s;}
.pay-opt.sel{border-color:var(--navy);background:rgba(0,0,0,0.02);}
.po-icon{font-size:22px;margin-bottom:5px;}
.po-name{font-size:13px;font-weight:700;}
.po-sub{font-size:10px;color:var(--muted);margin-top:2px;}
.form-foot{padding:14px 18px;background:var(--bg);border-top:0.5px solid var(--border);flex-shrink:0;}
/* Shop */
#s-shop{background:var(--bg);}
.shop-body{flex:1;overflow-y:auto;padding:14px;}
.sec-label{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
.products{display:flex;flex-direction:column;gap:10px;}
.p-card{background:var(--card);border:0.5px solid var(--border);border-radius:14px;overflow:hidden;display:flex;cursor:pointer;transition:transform 0.1s;}
.p-card:active{transform:scale(0.98);}
.p-thumb{width:90px;min-height:90px;flex-shrink:0;overflow:hidden;background:#E8E6E0;display:flex;align-items:center;justify-content:center;}
.p-thumb img{width:100%;height:100%;object-fit:cover;}
.no-img{font-size:26px;}
.p-body{padding:13px;flex:1;display:flex;flex-direction:column;justify-content:center;}
.p-itemcode{font-size:9px;font-family:monospace;color:var(--muted);margin-bottom:3px;letter-spacing:0.05em;}
.p-name{font-size:14px;font-weight:700;line-height:1.3;}
.p-sizes{font-size:11px;color:var(--muted);margin:3px 0 8px;}
.p-footer{display:flex;align-items:center;justify-content:space-between;}
.p-price{font-size:15px;font-weight:800;}
/* Detail */
#s-detail{background:var(--bg);}
.detail-img{height:200px;background:#E8E6E0;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.detail-img img{width:100%;height:100%;object-fit:cover;}
.detail-body{flex:1;overflow-y:auto;padding:18px;}
.d-itemcode{font-size:11px;font-family:monospace;color:var(--muted);margin-bottom:4px;}
.d-name{font-size:20px;font-weight:800;margin-bottom:4px;line-height:1.3;}
.d-price{font-size:19px;font-weight:800;color:var(--navy);margin-bottom:22px;}
.sz-label{font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;display:block;}
.sz-row{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:20px;}
.sz-btn{border:1px solid var(--border);border-radius:8px;padding:9px 14px;font-size:13px;font-weight:600;cursor:pointer;background:#fff;color:var(--text);}
.sz-btn.sel{background:var(--navy);color:#fff;border-color:var(--navy);}
.qty-wrap{display:flex;align-items:center;border:1px solid var(--border);border-radius:12px;background:#fff;width:fit-content;margin-bottom:26px;}
.q-btn{width:44px;height:44px;background:none;border:none;font-size:22px;cursor:pointer;}
.q-num{width:40px;text-align:center;font-size:16px;font-weight:800;}
.add-btn{width:100%;background:var(--navy);color:#fff;border:none;border-radius:12px;padding:16px;font-size:15px;font-weight:800;cursor:pointer;}
.add-btn:disabled{opacity:0.3;cursor:default;}
.need-sz{font-size:12px;color:var(--navy);margin-top:8px;text-align:center;display:none;}
/* Cart */
#s-cart{background:var(--bg);}
.cart-body{flex:1;overflow-y:auto;padding:14px;}
.empty-cart{text-align:center;padding:80px 20px;color:var(--muted);}
.c-item{background:var(--card);border:0.5px solid var(--border);border-radius:12px;padding:13px 15px;margin-bottom:9px;display:flex;align-items:center;gap:11px;}
.c-thumb{width:52px;height:52px;border-radius:8px;overflow:hidden;flex-shrink:0;background:#E8E6E0;display:flex;align-items:center;justify-content:center;}
.c-thumb img{width:100%;height:100%;object-fit:cover;}
.c-info{flex:1;min-width:0;}
.c-name{font-size:13px;font-weight:700;line-height:1.3;}
.c-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.c-right{text-align:right;flex-shrink:0;}
.c-price{font-size:14px;font-weight:800;}
.c-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;display:block;margin-top:5px;margin-left:auto;}
.cart-foot{padding:14px 18px;border-top:0.5px solid var(--border);background:var(--bg);flex-shrink:0;}
.total-row{display:flex;justify-content:space-between;font-size:17px;font-weight:800;margin-bottom:13px;}
/* Confirm */
#s-confirm{background:var(--bg);}
.confirm-body{flex:1;overflow-y:auto;padding:18px 16px 36px;}
.confirm-hero{background:var(--navy);border-radius:16px;padding:26px 22px;text-align:center;margin-bottom:18px;}
.ch-tag{font-size:10px;letter-spacing:0.25em;color:rgba(255,255,255,0.6);text-transform:uppercase;margin-bottom:8px;}
.ch-title{font-size:16px;font-weight:800;color:#fff;}
.ch-num{font-size:28px;font-weight:800;color:var(--gold);margin-top:7px;letter-spacing:-0.01em;}
.conf-sec{background:var(--card);border:0.5px solid var(--border);border-radius:13px;padding:15px;margin-bottom:12px;}
.cs-title{font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
.cs-row{display:flex;justify-content:space-between;align-items:flex-start;font-size:13px;padding:6px 0;border-bottom:0.5px solid var(--border);gap:8px;}
.cs-row:last-child{border:none;padding-bottom:0;}
.cs-row .label{color:var(--muted);flex-shrink:0;}
.cs-row .val{font-weight:700;text-align:right;word-break:break-all;}
.info-box{border-radius:11px;padding:14px;font-size:13px;line-height:1.7;margin-bottom:14px;white-space:pre-line;}
.info-box.card{background:#FFF8E7;border:1px solid #D4A820;color:#7A5A00;}
.info-box.bank{background:#EFF6FF;border:1px solid #93C5FD;color:#1E40AF;}
.btn-outline{width:100%;background:none;color:var(--navy);border:1px solid var(--border);border-radius:11px;padding:13px;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:10px;}
.btn-navy{width:100%;background:var(--navy);color:#fff;border:none;border-radius:11px;padding:15px;font-size:14px;font-weight:800;cursor:pointer;}
</style>
</head>
<body>

<!-- ① アクセス -->
<div class="screen active" id="s-access">
  <div class="access-inner">
    <div class="team-badge">
      <img src="https://drive.google.com/thumbnail?id=1E4kLjn9uYvxOaXjxtv3e058UvphVIE9k&sz=w400" alt="ZELKOVAS" style="width:100px;height:100px;object-fit:contain;margin-bottom:14px;border-radius:14px;box-shadow:0 4px 20px rgba(0,0,0,0.3);">
      <div class="tb-tag"></div>
      <div class="tb-name">ZELKOVAS STORE</div>
      <div class="tb-sub">TEAM MEMBERS ONLY</div>
    </div>
    <div class="a-card">
      <span class="a-label">チームコード</span>
      <input class="a-input" id="code-in" type="text" maxlength="12"
             placeholder="• • • • • •" autocomplete="off" autocapitalize="characters">
      <div class="a-err" id="a-err">&nbsp;</div>
      <button class="btn-gold" onclick="checkCode()">入 る</button>
    </div>
    <div class="demo-hint">チームコードは担当者にご確認ください</div>
  </div>
</div>

<!-- ② プロフィール登録 -->
<div class="screen" id="s-profile">
  <div class="profile-bar">
    <div class="who">チーム: <b>ZELKOVAS</b></div>
    <button class="edit-link" onclick="goTo('s-access')">ログアウト</button>
  </div>
  <div class="form-body">
    <div class="f-intro">📋 注文者情報の入力</div>
    <div class="f-sub">注文前に情報を入力してください。<br>請求書の送付先として使用します。</div>
    <div class="f-group">
      <label class="f-label">保護者名 <span style="color:var(--navy)">*</span></label>
      <input class="f-input" id="p-parentname" type="text" placeholder="山田 花子">
    </div>
    <div class="f-row">
      <div class="f-group">
        <label class="f-label">選手名 <span style="color:var(--navy)">*</span></label>
        <input class="f-input" id="p-name" type="text" placeholder="山田 太郎">
      </div>
      <div class="f-group">
        <label class="f-label">学年・期</label>
        <input class="f-input" id="p-grade" type="text" placeholder="2年">
      </div>
    </div>
    <div class="f-row">
      <div class="f-group">
        <label class="f-label">背番号</label>
        <input class="f-input" id="p-number" type="text" placeholder="21">
      </div>
      <div class="f-group">
        <label class="f-label">電話番号</label>
        <input class="f-input" id="p-phone" type="tel" placeholder="090-0000-0000">
      </div>
    </div>
    <div class="f-group">
      <label class="f-label">メールアドレス <span style="color:var(--navy)">*</span></label>
      <input class="f-input" id="p-email" type="email" placeholder="example@gmail.com">
      <div class="f-hint">請求書をこのアドレスに送付します</div>
    </div>
    <div class="f-group">
      <label class="f-label">お支払い方法</label>
      <div class="pay-opts">
        <div class="pay-opt sel" id="pay-card" onclick="selectPay('card')">
          <div class="po-icon">💳</div>
          <div class="po-name">カード</div>
          <div class="po-sub">Square決済</div>
        </div>
        <div class="pay-opt" id="pay-bank" onclick="selectPay('bank')">
          <div class="po-icon">🏦</div>
          <div class="po-name">振込</div>
          <div class="po-sub">銀行振込</div>
        </div>
      </div>
    </div>
  </div>
  <div class="form-foot">
    <button class="btn-navy" onclick="goShop()" style="width:100%;background:var(--navy);color:#fff;border:none;border-radius:11px;padding:15px;font-size:15px;font-weight:800;cursor:pointer;">ショップへ進む →</button>
  </div>
</div>

<!-- ③ ショップ -->
<div class="screen" id="s-shop">
  <div class="top-bar">
    <span class="bar-logo">ZELKOVAS STORE</span>
    <button class="bar-cart" onclick="goTo('s-cart')">
      🛒 <span id="cart-count">0</span>点
      <span class="badge" id="cart-badge" style="display:none">!</span>
    </button>
  </div>
  <div class="shop-body">
    <div class="sec-label">商品一覧</div>
    <div class="products" id="product-list"></div>
  </div>
</div>

<!-- ④ 商品詳細 -->
<div class="screen" id="s-detail">
  <div class="top-bar">
    <span class="back-link" onclick="goTo('s-shop')">← 戻る</span>
    <span class="bar-logo">ZELKOVAS STORE</span>
    <button class="bar-cart" onclick="goTo('s-cart')">🛒 <span id="cart-count2">0</span>点</button>
  </div>
  <div class="detail-img" id="detail-img"></div>
  <div class="detail-body">
    <div class="d-itemcode" id="d-itemcode"></div>
    <div class="d-name" id="d-name"></div>
    <div class="d-price" id="d-price"></div>
    <span class="sz-label">サイズを選択</span>
    <div class="sz-row" id="sz-row"></div>
    <span class="sz-label">数量</span>
    <div class="qty-wrap">
      <button class="q-btn" onclick="changeQty(-1)">−</button>
      <span class="q-num" id="q-num">1</span>
      <button class="q-btn" onclick="changeQty(1)">＋</button>
    </div>
    <button class="add-btn" id="add-btn" onclick="addToCart()">カートに追加</button>
    <div class="need-sz" id="need-sz">サイズを選択してください</div>
  </div>
</div>

<!-- ⑤ カート -->
<div class="screen" id="s-cart">
  <div class="top-bar">
    <span class="back-link" onclick="goTo('s-shop')">← 戻る</span>
    <span class="bar-logo">カート</span>
    <span style="width:60px;"></span>
  </div>
  <div class="cart-body" id="cart-body"></div>
  <div class="cart-foot">
    <div class="total-row">
      <span>合計</span>
      <span id="cart-total">¥0</span>
    </div>
    <button class="btn-navy" style="width:100%;background:var(--navy);color:#fff;border:none;border-radius:11px;padding:15px;font-size:15px;font-weight:800;cursor:pointer;" onclick="goConfirm()">注文内容を確認 →</button>
  </div>
</div>

<!-- ⑥ 確認・完了 -->
<div class="screen" id="s-confirm">
  <div class="top-bar">
    <span class="back-link" id="back-from-confirm" onclick="goTo('s-cart')">← 戻る</span>
    <span class="bar-logo">確認</span>
    <span style="width:60px;"></span>
  </div>
  <div class="confirm-body">
    <div id="confirm-content"></div>
  </div>
</div>

<script>
const TEAM_CODE = 'UAF-ZLKV';
const GAS_URL   = 'https://script.google.com/macros/s/AKfycbzgON3EDRPdw3jWIZaHPO11L-HK4RkNDZ1d30kzdvTRdMPCIQ_lH4vUBwMAMG3eIg_Q/exec';

const PRODUCTS = [
  {id:1,itemCode:"3",name:"昇華ユニフォーム　上",price:8470,sizes:["フリーサイズ"],img:"",category:"アメフトユニフォーム"},
  {id:2,itemCode:"4",name:"昇華ユニフォーム　下",price:8470,sizes:["フリーサイズ"],img:"",category:"アメフトユニフォーム"},
  {id:3,itemCode:"9",name:"マッスルスリーブ",price:5280,sizes:["S"],img:"",category:"練習用ウェア"},
  {id:4,itemCode:"10",name:"マッスルスリーブ",price:5280,sizes:["M"],img:"",category:"練習用ウェア"},
  {id:5,itemCode:"11",name:"マッスルスリーブ",price:5280,sizes:["L"],img:"",category:"練習用ウェア"},
  {id:6,itemCode:"12",name:"マッスルスリーブ",price:5280,sizes:["XL"],img:"",category:"練習用ウェア"},
  {id:7,itemCode:"13",name:"マッスルスリーブ",price:5280,sizes:["XXL"],img:"",category:"練習用ウェア"}
];

let profile  = null;
let cart     = [];
let selProd  = null;
let selSize  = null;
let selQty   = 1;
let ordDone  = false;

function goTo(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function checkCode() {
  const v = document.getElementById('code-in').value.trim().toUpperCase();
  if (v === TEAM_CODE) {
    document.getElementById('a-err').textContent = '';
    goTo('s-profile');
  } else {
    document.getElementById('a-err').textContent = 'コードが違います';
  }
}
document.getElementById('code-in').addEventListener('keydown', e => { if(e.key==='Enter') checkCode(); });

let selectedPay = 'card';
function selectPay(type) {
  selectedPay = type;
  document.getElementById('pay-card').classList.toggle('sel', type==='card');
  document.getElementById('pay-bank').classList.toggle('sel', type==='bank');
}

function goShop() {
  const parentName = document.getElementById('p-parentname').value.trim();
  const name  = document.getElementById('p-name').value.trim();
  const email = document.getElementById('p-email').value.trim();
  if (!parentName || !name || !email) {
    alert('保護者名・選手名・メールアドレスは必須です');
    return;
  }
  profile = {
    parentName,
    name,
    grade:  document.getElementById('p-grade').value.trim(),
    number: document.getElementById('p-number').value.trim(),
    phone:  document.getElementById('p-phone').value.trim(),
    email,
    pay: selectedPay,
  };
  renderShop();
  goTo('s-shop');
}

function renderShop() {
  const list = document.getElementById('product-list');
  list.innerHTML = PRODUCTS.map(p => `
    <div class="p-card" onclick="openDetail(${p.id})">
      <div class="p-thumb">
        ${p.img ? `<img src="${p.img}" alt="${p.name}" onerror="this.parentNode.innerHTML='<span class=no-img>👕</span>'">` : '<span class="no-img">👕</span>'}
      </div>
      <div class="p-body">
        ${p.itemCode ? `<div class="p-itemcode">${p.itemCode}</div>` : ''}
        <div class="p-name">${p.name}</div>
        <div class="p-sizes">${p.sizes.join(' / ')}</div>
        <div class="p-footer">
          <div class="p-price">¥${p.price.toLocaleString()}</div>
          <span style="color:var(--muted);font-size:18px;">›</span>
        </div>
      </div>
    </div>
  `).join('');
}

function openDetail(id) {
  selProd = PRODUCTS.find(p => p.id === id);
  selSize = null;
  selQty  = 1;
  if (!selProd) return;

  document.getElementById('detail-img').innerHTML = selProd.img
    ? `<img src="${selProd.img}" alt="${selProd.name}" onerror="this.style.display='none'">`
    : '<span style="font-size:56px;">👕</span>';
  document.getElementById('d-itemcode').textContent = selProd.itemCode ? `品番: ${selProd.itemCode}` : '';
  document.getElementById('d-name').textContent  = selProd.name;
  document.getElementById('d-price').textContent = '¥' + selProd.price.toLocaleString();
  document.getElementById('q-num').textContent   = 1;
  document.getElementById('need-sz').style.display = 'none';

  const szRow = document.getElementById('sz-row');
  szRow.innerHTML = selProd.sizes.map(s => `
    <button class="sz-btn" onclick="selectSize('${s}')">${s}</button>
  `).join('');

  goTo('s-detail');
}

function selectSize(s) {
  selSize = s;
  document.querySelectorAll('.sz-btn').forEach(b => b.classList.toggle('sel', b.textContent === s));
  document.getElementById('need-sz').style.display = 'none';
}

function changeQty(d) {
  selQty = Math.max(1, selQty + d);
  document.getElementById('q-num').textContent = selQty;
}

function addToCart() {
  if (!selSize) {
    document.getElementById('need-sz').style.display = 'block';
    return;
  }
  const existing = cart.find(i => i.prodId === selProd.id && i.size === selSize);
  if (existing) {
    existing.qty += selQty;
  } else {
    cart.push({
      prodId:   selProd.id,
      itemCode: selProd.itemCode || '',
      name:     selProd.name,
      size:     selSize,
      qty:      selQty,
      price:    selProd.price,
      img:      selProd.img,
    });
  }
  updateCartCount();
  goTo('s-shop');
}

function updateCartCount() {
  const total = cart.reduce((s,i) => s + i.qty, 0);
  document.getElementById('cart-count').textContent  = total;
  document.getElementById('cart-count2').textContent = total;
  const badge = document.getElementById('cart-badge');
  if (badge) badge.style.display = total > 0 ? 'flex' : 'none';
}

function renderCart() {
  const body = document.getElementById('cart-body');
  if (cart.length === 0) {
    body.innerHTML = '<div class="empty-cart"><div class="empty-icon" style="font-size:38px;margin-bottom:10px;">🛒</div><div style="font-size:14px;color:var(--muted);">カートが空です</div></div>';
    document.getElementById('cart-total').textContent = '¥0';
    return;
  }
  body.innerHTML = cart.map((item, i) => `
    <div class="c-item">
      <div class="c-thumb">
        ${item.img ? `<img src="${item.img}" alt="${item.name}" onerror="this.parentNode.innerHTML='<span>👕</span>'">` : '<span>👕</span>'}
      </div>
      <div class="c-info">
        ${item.itemCode ? `<div style="font-size:9px;font-family:monospace;color:var(--muted);">${item.itemCode}</div>` : ''}
        <div class="c-name">${item.name}</div>
        <div class="c-sub">${item.size} × ${item.qty}</div>
      </div>
      <div class="c-right">
        <div class="c-price">¥${(item.price * item.qty).toLocaleString()}</div>
        <button class="c-del" onclick="removeCart(${i})">×</button>
      </div>
    </div>
  `).join('');
  const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
  document.getElementById('cart-total').textContent = '¥' + total.toLocaleString();
}

function removeCart(i) {
  cart.splice(i, 1);
  renderCart();
  updateCartCount();
}

function goConfirm() {
  if (cart.length === 0) { alert('カートが空です'); return; }
  renderCart();
  const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
  const now   = new Date();
  const ordNum = TEAM_CODE + '-' + now.getFullYear().toString().slice(2)
    + String(now.getMonth()+1).padStart(2,'0')
    + String(now.getDate()).padStart(2,'0')
    + '-' + String(Math.floor(Math.random()*10000)).padStart(4,'0');

  const itemRows = cart.map(item => `
    <div class="cs-row">
      <span class="label">${item.name}<br><small style="font-size:10px;opacity:0.6;">${item.itemCode ? item.itemCode + ' / ' : ''}${item.size}</small></span>
      <span class="val">×${item.qty}　¥${(item.price*item.qty).toLocaleString()}</span>
    </div>
  `).join('');

  const payBox = profile.pay === 'card'
    ? '<div class="info-box card">💳 Square決済リンクを後ほどメールでお送りします。</div>'
    : '<div class="info-box bank">🏦 振込先情報を後ほどメールでお送りします。</div>';

  document.getElementById('confirm-content').innerHTML = `
    <div class="confirm-hero">
      <div class="ch-tag">ご注文内容の確認</div>
      <div class="ch-title">${profile.name} 選手</div>
      <div class="ch-num">${ordNum}</div>
    </div>
    <div class="conf-sec">
      <div class="cs-title">注文者情報</div>
      <div class="cs-row"><span class="label">保護者名</span><span class="val">${profile.parentName}</span></div>
      <div class="cs-row"><span class="label">選手名</span><span class="val">${profile.name}</span></div>
      <div class="cs-row"><span class="label">学年/期</span><span class="val">${profile.grade || '—'}</span></div>
      <div class="cs-row"><span class="label">背番号</span><span class="val">${profile.number || '—'}</span></div>
      <div class="cs-row"><span class="label">メール</span><span class="val">${profile.email}</span></div>
    </div>
    <div class="conf-sec">
      <div class="cs-title">注文内容</div>
      ${itemRows}
      <div class="cs-row" style="margin-top:8px;font-size:15px;font-weight:800;">
        <span>合計</span>
        <span>¥${total.toLocaleString()}</span>
      </div>
    </div>
    ${payBox}
    <button class="btn-navy" id="submit-btn" onclick="submitOrder('${ordNum}', ${total})">
      この内容で注文する
    </button>
  `;
  document.getElementById('back-from-confirm').style.display = 'inline';
  goTo('s-confirm');
}

async function submitOrder(ordNum, total) {
  if (ordDone) return;
  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = '送信中...';

  try {
    const body = { ordNum, profile, cart, total };
    await fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
      mode: 'no-cors',
    });

    ordDone = true;
    document.getElementById('back-from-confirm').style.display = 'none';
    document.getElementById('confirm-content').innerHTML = `
      <div style="text-align:center;padding:60px 20px;">
        <div style="font-size:56px;margin-bottom:18px;">✅</div>
        <div style="font-size:20px;font-weight:800;margin-bottom:8px;">ご注文ありがとうございます！</div>
        <div style="font-size:13px;color:var(--muted);line-height:1.8;margin-bottom:24px;">
          注文番号: <b>${ordNum}</b><br>
          確認メールを ${profile.email} に送信しました。<br>
          請求書は締切後にメールでお送りします。
        </div>
        <div style="background:#f0f4f8;border-radius:12px;padding:16px;font-size:12px;color:var(--muted);line-height:1.7;">
          合計金額: ¥${total.toLocaleString()}<br>
          お支払い方法のご案内を別途お送りします。
        </div>
      </div>
    `;
  } catch (err) {
    btn.disabled = false;
    btn.textContent = 'もう一度試す';
    alert('送信に失敗しました。時間をおいて再試行してください。');
  }
}

// カート画面に遷移するたびに再描画
const cartObserver = new MutationObserver(() => {
  if (document.getElementById('s-cart').classList.contains('active')) renderCart();
});
cartObserver.observe(document.getElementById('s-cart'), { attributeFilter: ['class'] });
</script>
</body>
</html>
